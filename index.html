<!DOCTYPE html>
<html lang="en" class="h-full w-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cayr - Professional Healthcare Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f4f7fe;
      color: #1a1d1f;
    }

    .login-bg {
      background: #aed9f4;
      background-attachment: fixed;
      position: relative;
      overflow: hidden;
    }

    .login-bg::after {
      content: "";
      position: absolute;
      width: 150%;
      height: 150%;
      top: -25%;
      left: -25%;
      background-image: url('https://www.transparenttextures.com/patterns/clouds-base.png');
      opacity: 0.4;
      z-index: 0;
      pointer-events: none;
    }

    .glass-login {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
    }

    .sidebar-item:hover {
      background-color: #eff2fe;
      color: #3b5bfd;
    }

    .sidebar-item.active {
      background-color: #3b5bfd;
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(59, 91, 253, 0.25);
    }

    .shadow-card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
      border: 1px solid #eff2f6;
    }

    .btn-primary {
      background-color: #3b5bfd;
      color: white;
      transition: all 0.2s ease;
    }

    .btn-primary:hover {
      background-color: #2d46e5;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    /* AR Scan Line Animation */
    @keyframes scan {
      0% {
        top: 0%;
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        top: 100%;
        opacity: 0;
      }
    }

    .ar-scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(to right, transparent, #3b5bfd, transparent);
      box-shadow: 0 0 20px #3b5bfd;
      animation: scan 3s linear infinite;
      z-index: 20;
      pointer-events: none;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "jspdf": "https://esm.sh/jspdf@^2.5.1"
  }
}
</script>
</head>

<body class="antialiased select-none">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
